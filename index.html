<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>onik-zxcv Practice</title>
<meta name="description" content="onik-zxcv配列の練習用ページ" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>onik-zxcv Practice</h1>
  </header>

  <main class="layout">
    <nav class="lesson-nav" id="lesson-nav"></nav>

    <section class="practice-panel">
      <div class="lesson-info">
        <h2 id="lesson-title"></h2>
        <p id="lesson-desc"></p>
      </div>

      <div class="sentence-box" id="sentence"></div>

      <div class="keyboard" id="keyboard"></div>
      <div class="fingers" id="fingers"></div>

      <div class="controls">
        <div class="stats-row">
          <span id="stats"></span>
          <span class="unlock-hint" id="unlock-hint"></span>
        </div>
        <p class="rule-hint">※ ミス5回以下 かつ 秒2打以上 を達成すると、次のレッスンが解禁されます。</p>
        <div class="buttons">
          <button id="btn-prev-lesson">前のレッスン</button>
          <button id="btn-retry">もう一度</button>
          <button id="btn-next" disabled>次へ</button>
          <button id="btn-repeat-mode" aria-pressed="false" title="くり返しモード" aria-label="くり返しモード">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M17 2l4 4-4 4" />
              <path d="M3 11V9a4 4 0 0 1 4-4h14" />
              <path d="M7 22l-4-4 4-4" />
              <path d="M21 13v2a4 4 0 0 1-4 4H3" />
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      配列: <a href="https://note.com/oidy/n/n80f31fe43b98" target="_blank" rel="noopener noreferrer">onik-zxcv</a>
      ／ ソース: <a href="https://github.com/noma-t/onik-zxcv-practice" target="_blank" rel="noopener noreferrer">GitHub</a>
    </p>
  </footer>

<script src="layout-data.js"></script>
<script src="lessons-data.js"></script>
<script src="app.js"></script>
</body>
</html>
